services:
  postgres:
    image: postgres:18
    container_name: accio-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NUXT_DATABASE_NAME}
      POSTGRES_USER: ${NUXT_DATABASE_USER}
      POSTGRES_PASSWORD: ${NUXT_DATABASE_PASSWORD}
    ports:
      - '${NUXT_DATABASE_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
